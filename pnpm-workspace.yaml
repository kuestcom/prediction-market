minimumReleaseAge: 1440
shellEmulator: true
blockExoticSubdeps: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - '@noble/curves@1.8.0'
  - '@noble/hashes@1.7.0'
  - semver@6.3.1
  - slow-redact@0.3.2
  - tinyexec@1.2.2

allowBuilds:
  '@parcel/watcher': false
  '@reown/appkit': true
  '@sentry/cli': true
  '@swc/core': true
  bufferutil: false
  esbuild: true
  keccak: false
  sharp: false
  utf-8-validate: false

overrides:
  '@wagmi/connectors': 6.2.0
  '@wagmi/core': 2.22.1
